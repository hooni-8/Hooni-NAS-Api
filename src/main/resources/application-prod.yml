    context-path: /${spring.application.root}

###########################################################################
### Spring 설정
###########################################################################
spring:
  application:
    root: nas
    name: nas-api

  datasource:
    driver-class-name: net.sf.log4jdbc.sql.jdbcapi.DriverSpy
    url: ENC(TdV0eYAL3LSlvbDFTztpiKz9tOxKWlCzeITpstvd8fndTDbS+DCNhbVIccLTxm73j7uwc84+1N03zraodFE1e7EC5oU6k/10+OWp25LN/xxRDwXmyMbw+ZqJiwJLbMel)
